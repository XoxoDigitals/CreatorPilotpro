# /etc/nginx/sites-available/creator-pilot-pro
# Required for video publishing — default 1MB limit breaks /api/posts/publish
client_max_body_size 250M;

server {
    listen 80;
    server_name creatorpilotpro.com www.creatorpilotpro.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Video uploads + TikTok publish polling can take several minutes
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
    }
}

# If certbot added HTTPS, add the same client_max_body_size + timeouts
# inside your listen 443 ssl { ... } server block as well.
